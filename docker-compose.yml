services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kiwimind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kiwimind-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kiwimind"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Database=kiwimind;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy

volumes:
  kiwimind-db-data:
